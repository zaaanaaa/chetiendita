<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Che Tiendita | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <div class="top-row">
      <div class="brand-pill">Panel admin</div>
      <div class="session-box">
        <a class="btn btn-secondary" href="./index.html">Catalogo</a>
        <button id="logoutBtn" class="btn btn-secondary" type="button">Cerrar sesion</button>
      </div>
    </div>
    <h1>Administracion</h1>
  </header>

  <main class="catalog-wrap">
    <section class="panel">
      <h2>Atributos (etiquetas)</h2>
      <form id="tagForm" class="form-grid">
        <input id="tagName" type="text" placeholder="Ej: electros" required />
        <button class="btn btn-primary" type="submit">Crear atributo</button>
      </form>
      <div id="tagList" class="admin-list"></div>
    </section>

    <section class="panel">
      <h2>Productos</h2>
      <form id="productForm" class="admin-form">
        <input type="hidden" id="productId" />
        <input id="productName" type="text" placeholder="Nombre" required />
        <input id="productPrice" type="number" min="1" placeholder="Precio" required />
        <input id="productImage" type="url" placeholder="URL imagen" required />
        <textarea id="productDescription" rows="3" placeholder="Descripcion" required></textarea>
        <label class="check-row">
          <input id="productFeatured" type="checkbox" />
          Destacado
        </label>
        <div id="tagsCheckboxes" class="tags-box"></div>
        <div class="admin-actions">
          <button class="btn btn-primary" type="submit">Guardar</button>
          <button class="btn btn-secondary" type="button" id="cancelEditBtn">Cancelar</button>
        </div>
      </form>
      <div id="adminList" class="admin-list"></div>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
